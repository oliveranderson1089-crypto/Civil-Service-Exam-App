<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a6fb5">
<title>管理后台 · 公考助手</title>
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<style>
  .admin-main{max-width:900px;margin:0 auto;padding:16px 14px 50px;}
  .utable{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;
    box-shadow:var(--shadow);font-size:14px;}
  .utable th,.utable td{padding:11px 10px;text-align:left;border-bottom:1px solid var(--line);}
  .utable th{background:#f0f4f9;color:#555;font-weight:600;font-size:13px;}
  .utable tr:last-child td{border-bottom:none;}
  .role-badge{font-size:11px;padding:2px 8px;border-radius:20px;}
  .role-admin{background:#fde8c8;color:#a86a00;}
  .role-user{background:#e8eef6;color:#5a6b85;}
  .ubtn{border:1.5px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;
    font-size:12.5px;cursor:pointer;margin:2px;white-space:nowrap;}
  .ubtn:hover{border-color:var(--blue);color:var(--blue);}
  .ubtn.danger:hover{border-color:#c0392b;color:#c0392b;}
  .uadd{color:#999;font-size:12px;}
  .admin-cards{display:none;}
  @media(max-width:640px){
    .utable{display:none;}
    .admin-cards{display:grid;gap:10px;}
    .ucard{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:13px 14px;}
    .ucard h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px;}
    .ucard .meta{font-size:12.5px;color:var(--muted);margin-bottom:8px;}
    .ucard .acts{display:flex;flex-wrap:wrap;gap:4px;}
  }
  .ai-cfg{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:16px;}
  .ai-tip{font-size:13px;color:#667;margin:0 0 14px;line-height:1.7;}
  .ai-f{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
  .ai-f span{flex:0 0 74px;font-size:13px;color:#555;}
  .ai-f input{flex:1;padding:9px 11px;border:1.5px solid #e6e9ef;border-radius:8px;font-size:14px;outline:none;}
  .ai-f input:focus{border-color:var(--blue);}
  .ai-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
  .ubtn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
  .ai-msg2{font-size:13px;margin-top:10px;white-space:pre-wrap;line-height:1.6;}
  .ai-msg2.ok{color:#1f9d57;}
  .ai-msg2.err{color:#c0392b;}
</style>
</head>
<body>
<header class="topbar">
  <button class="navbtn" onclick="location.href='/'">‹ 返回应用</button>
  <div class="brand-min"><span class="logo-min">管</span><span>管理后台</span></div>
  <div class="topbar-actions"></div>
</header>
<main class="admin-main">
  <h2 class="view-title">AI 设置</h2>
  <div class="ai-cfg">
    <p class="ai-tip">接入云端大模型（默认 <b>DeepSeek</b>，OpenAI 兼容）。到 <b>platform.deepseek.com</b> 申请 API Key 填入即可；用于 AI 助手、古诗文释义、错题分析等。</p>
    <label class="ai-f"><span>接口地址</span><input id="ai-base" type="text" placeholder="https://api.deepseek.com"></label>
    <label class="ai-f"><span>模型</span><input id="ai-model" type="text" placeholder="deepseek-chat"></label>
    <label class="ai-f"><span>API Key</span><input id="ai-key" type="password" placeholder="留空=不改；已设会显示●●●" autocomplete="off"></label>
    <div class="ai-acts">
      <button class="ubtn" id="ai-clearkey">清除 Key</button>
      <button class="ubtn" id="ai-test">测试连通</button>
      <button class="ubtn primary" id="ai-save">保存</button>
    </div>
    <div id="ai-msg" class="ai-msg2"></div>
  </div>
  <h2 class="view-title" style="margin-top:26px;">用户管理 <span class="uadd" id="ucount"></span></h2>
  <table class="utable" id="utable">
    <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>密保</th><th>收录</th><th>资料</th><th>注册时间</th><th>操作</th></tr></thead>
    <tbody id="utbody"></tbody>
  </table>
  <div class="admin-cards" id="ucards"></div>
</main>
<div id="secq-modal" class="modal hidden">
  <div class="modal-box">
    <h3>设置密保 · <span id="sq-user"></span></h3>
    <div class="set-title" style="margin-bottom:5px;color:#888;font-size:13px;">密保问题</div>
    <select id="sq-question" style="width:100%;padding:9px 11px;border:1.5px solid #e6e9ef;border-radius:8px;font-size:14px;margin-bottom:12px;"></select>
    <div class="set-title" style="margin-bottom:5px;color:#888;font-size:13px;">密保答案</div>
    <input id="sq-answer" type="text" placeholder="设置后用户可用它找回密码" style="width:100%;padding:9px 11px;border:1.5px solid #e6e9ef;border-radius:8px;font-size:14px;">
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn" onclick="closeSecq()">取消</button>
      <button class="btn primary" onclick="saveSecq()">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script>
const $ = (s) => document.querySelector(s);
let ME_ID = null;
function toast(m, err) { const t = $('#toast'); t.textContent = m; t.className = 'toast' + (err ? ' err' : ''); clearTimeout(t._t); t._t = setTimeout(() => t.classList.add('hidden'), 2200); }
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function load() {
  let me; try { me = await (await fetch('/api/me')).json(); } catch (_) {}
  const r = await fetch('/api/admin/users');
  if (r.status === 403) { document.body.innerHTML = '<p style="text-align:center;margin-top:60px;color:#888">需要管理员权限。<a href="/">返回</a></p>'; return; }
  if (r.status === 401) { location.href = '/login'; return; }
  const d = await r.json();
  $('#ucount').textContent = '共 ' + d.users.length + ' 人';
  $('#utbody').innerHTML = d.users.map(u => `
    <tr>
      <td>${u.id}</td><td><b>${esc(u.username)}</b></td>
      <td><span class="role-badge role-${u.role}">${u.role === 'admin' ? '管理员' : '普通'}</span></td>
      <td>${u.sec_question ? '已设' : '—'}</td>
      <td>${u.entry_cnt}</td><td>${u.mat_cnt}</td>
      <td style="font-size:12px;color:#999">${esc((u.created_at || '').slice(0, 16))}</td>
      <td>${actions(u)}</td>
    </tr>`).join('');
  $('#ucards').innerHTML = d.users.map(u => `
    <div class="ucard">
      <h3>${esc(u.username)} <span class="role-badge role-${u.role}">${u.role === 'admin' ? '管理员' : '普通'}</span></h3>
      <div class="meta">ID ${u.id} · 收录 ${u.entry_cnt} · 资料 ${u.mat_cnt} · 密保${u.sec_question ? '已设' : '未设'}</div>
      <div class="acts">${actions(u)}</div>
    </div>`).join('');
}
let MY_NAME = null;
function actions(u) {
  const self = (u.username === MY_NAME);
  let s = `<button class="ubtn" onclick="resetPw(${u.id},'${esc(u.username)}')">重置密码</button>`;
  s += `<button class="ubtn" onclick="setSecq(${u.id},'${esc(u.username)}')">设置密保</button>`;
  s += `<button class="ubtn" onclick="toggleRole(${u.id},${u.role === 'admin'})">${u.role === 'admin' ? '设为普通' : '设为管理员'}</button>`;
  if (!self) s += `<button class="ubtn danger" onclick="delUser(${u.id},'${esc(u.username)}')">删除</button>`;
  return s;
}
let sqUid = null;
async function setSecq(id, name) {
  sqUid = id;
  $('#sq-user').textContent = name;
  try {
    const qs = (await (await fetch('/api/sec_questions')).json()).questions;
    $('#sq-question').innerHTML = qs.map(q => `<option>${esc(q)}</option>`).join('');
  } catch (_) {}
  $('#sq-answer').value = '';
  $('#secq-modal').classList.remove('hidden');
}
function closeSecq() { $('#secq-modal').classList.add('hidden'); }
async function saveSecq() {
  const q = $('#sq-question').value, a = $('#sq-answer').value.trim();
  if (!a) { toast('请填写密保答案', true); return; }
  const r = await fetch('/api/admin/users/' + sqUid + '/secq', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question: q, answer: a }) });
  const d = await r.json();
  if (r.ok) { toast('已设置密保'); closeSecq(); load(); } else toast(d.error || '失败', true);
}
async function resetPw(id, name) {
  if (!confirm('把「' + name + '」的密码重置为初始密码 123456？')) return;
  const r = await fetch('/api/admin/users/' + id + '/reset', { method: 'POST' });
  const d = await r.json();
  if (r.ok) toast('已重置为 ' + d.password); else toast(d.error || '失败', true);
}
async function toggleRole(id, isAdmin) {
  const r = await fetch('/api/admin/users/' + id + '/role', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ admin: !isAdmin }) });
  const d = await r.json();
  if (r.ok) { toast('已更新'); load(); } else toast(d.error || '失败', true);
}
async function delUser(id, name) {
  if (!confirm('删除用户「' + name + '」？其收录和资料将一并删除，不可恢复！')) return;
  const r = await fetch('/api/admin/users/' + id, { method: 'DELETE' });
  const d = await r.json();
  if (r.ok) { toast('已删除'); load(); } else toast(d.error || '失败', true);
}
async function loadAI() {
  try {
    const d = await (await fetch('/api/admin/ai')).json();
    $('#ai-base').value = d.base || '';
    $('#ai-model').value = d.model || '';
    $('#ai-key').placeholder = d.has_key ? '已设置 ●●●（留空=不改）' : 'sk-...（DeepSeek 的 API Key）';
  } catch (_) {}
}
function aiMsg(text, ok) { const m = $('#ai-msg'); m.textContent = text; m.className = 'ai-msg2 ' + (ok === true ? 'ok' : ok === false ? 'err' : ''); }
$('#ai-save').onclick = async () => {
  const body = { base: $('#ai-base').value.trim(), model: $('#ai-model').value.trim() };
  const k = $('#ai-key').value.trim(); if (k) body.key = k;
  aiMsg('保存中…');
  try {
    const d = await (await fetch('/api/admin/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })).json();
    $('#ai-key').value = '';
    aiMsg(d.configured ? '已保存，AI 已就绪。' : '已保存，但还没有可用的 API Key。', d.configured);
    loadAI();
  } catch (e) { aiMsg('保存失败：' + e.message, false); }
};
$('#ai-clearkey').onclick = async () => {
  if (!confirm('清除已保存的 API Key？')) return;
  try { await fetch('/api/admin/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clear_key: true }) }); aiMsg('已清除 Key', true); loadAI(); }
  catch (e) { aiMsg('失败：' + e.message, false); }
};
$('#ai-test').onclick = async () => {
  aiMsg('测试中…（会真实调用一次）');
  try {
    const r = await fetch('/api/ai/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: '用一句话自我介绍。', max_tokens: 60 }) });
    const d = await r.json();
    if (r.ok) aiMsg('✓ 连通成功，AI 回复：\n' + d.reply, true);
    else aiMsg('✗ ' + (d.error || '失败') + (d.detail ? '\n' + d.detail : ''), false);
  } catch (e) { aiMsg('✗ ' + e.message, false); }
};
(async () => {
  try { const me = await (await fetch('/api/me')).json(); MY_NAME = me.username; } catch (_) {}
  await load();
  await loadAI();
})();
</script>
</body>
</html>
