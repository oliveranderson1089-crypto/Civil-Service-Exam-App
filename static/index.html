<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a6fb5">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>公考助手</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <button id="nav-back" class="navbtn hidden">‹ 返回</button>
  <div class="brand-min">
    <span class="logo-min">公</span>
    <span id="top-title">公考助手</span>
  </div>
  <div class="topbar-actions">
    <button id="admin-btn" class="logout hidden" title="管理后台">后台</button>
    <button id="settings-btn" class="logout" title="账号设置">设置</button>
    <button id="logout-btn" class="logout" title="退出登录">退出</button>
  </div>
</header>

<main>
  <!-- ===== 首页 ===== -->
  <section id="view-home" class="view">
    <p class="welcome">欢迎，<b id="me-name"></b> 👋</p>
    <div class="home-cards" id="home-cards"></div>
  </section>

  <!-- ===== 板块列表（行测/申论 下的小板块） ===== -->
  <section id="view-section" class="view hidden">
    <h2 class="view-title" id="section-title"></h2>
    <div class="board-grid" id="board-grid"></div>
  </section>

  <!-- ===== 板块详情：功能图标（或建设中占位） ===== -->
  <section id="view-board" class="view hidden">
    <h2 class="view-title" id="board-title"></h2>
    <div class="home-cards" id="board-features"></div>
    <div class="placeholder-box hidden" id="board-ph">
      <div class="ph-icon">🚧</div>
      <h2 id="board-ph-title"></h2>
      <p>该板块功能正在建设中。<br>你可以先到「小记」按板块记笔记，或在「资料库」存放该板块的资料。</p>
    </div>
  </section>

  <!-- ===== 小记（仿语雀：板块栏 + 编辑器 + 动态流） ===== -->
  <section id="view-notes" class="view hidden">
    <div class="notes2">
      <aside class="notes-sidebar" id="notes-sidebar"></aside>
      <div class="notes-content">
        <!-- 编辑器 -->
        <div class="composer">
          <div class="cp-bar">
            <button class="cp-tool" data-cp="img" title="图片">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
            </button>
            <button class="cp-tool" data-cp="todo" title="清单">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l2.5 2.5L16 8"/><rect x="3" y="3" width="18" height="18" rx="2.5"/></svg>
            </button>
            <button class="cp-tool" data-cp="file" title="附件">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="cp-tool" data-cp="cam" title="拍照">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
            <button class="cp-tool tag-tool" data-cp="tag" title="标签">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>标签
            </button>
            <span class="cp-board" id="cp-board"></span>
          </div>
          <textarea id="cp-content" placeholder="记你想记…"></textarea>
          <div id="cp-todos" class="cp-todos"></div>
          <div id="cp-imgs" class="cp-thumbs"></div>
          <div id="cp-files" class="cp-files"></div>
          <div id="cp-tags" class="cp-tagedit"></div>
          <div class="cp-foot">
            <span class="cp-hint" id="cp-hint"></span>
            <span class="cp-btns">
              <button id="cp-del" class="btn hidden">删除</button>
              <button id="cp-cancel" class="btn hidden">取消</button>
              <button id="cp-submit" class="btn primary">发布</button>
            </span>
          </div>
          <input id="cp-imgfile" type="file" accept="image/*" multiple hidden>
          <input id="cp-attfile" type="file" multiple hidden>
          <input id="cp-camfile" type="file" accept="image/*" capture="environment" hidden>
        </div>
        <!-- 动态流 -->
        <div class="feed-wrap">
          <div class="feed-filter" id="feed-tags"></div>
          <div class="feed" id="feed"></div>
          <p id="feed-empty" class="empty hidden">这个板块还没有小记，上面写一条吧～</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 资料库 ===== -->
  <section id="view-materials" class="view hidden">
    <div class="mat-head">
      <h2 class="view-title" style="margin:0;">📁 资料库</h2>
      <div class="mat-head-btns">
        <label class="btn cam-btn" title="拍照上传">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>拍照
          <input id="mat-camfile" type="file" accept="image/*" capture="environment" hidden>
        </label>
        <button id="upload-btn" class="btn primary">+ 上传资料</button>
      </div>
    </div>
    <div class="mat-filter" id="mat-filter"></div>
    <div id="mat-list" class="mat-list"></div>
    <p id="mat-empty" class="empty hidden">还没有资料，点「上传资料」添加。</p>
  </section>

  <!-- ===== 成语词语 ===== -->
  <section id="view-idiom" class="view hidden">
    <section class="card add-card">
      <div class="add-row">
        <input id="word-input" type="text" placeholder="输入成语或词语，回车查询…" autocomplete="off">
        <button id="lookup-btn" class="btn">查询</button>
      </div>
      <div id="preview" class="preview hidden">
        <div class="pv-head">
          <span class="pv-word" id="pv-word"></span>
          <span class="pv-py" id="pv-py"></span>
          <span class="pv-tag" id="pv-cat"></span>
          <span class="pv-found" id="pv-found"></span>
        </div>
        <div class="pv-field"><label>释义</label><textarea id="pv-exp" rows="2"></textarea></div>
        <div class="pv-field" id="pv-der-wrap"><label>出处</label><textarea id="pv-der" rows="1"></textarea></div>
        <div class="pv-field" id="pv-exa-wrap"><label>例句</label><textarea id="pv-exa" rows="1"></textarea></div>
        <div class="pv-field"><label>笔记</label><input id="pv-note" type="text" placeholder="辨析、易混词、真题出处…"></div>
        <div class="pv-actions">
          <label class="catpick">类别：
            <select id="pv-catsel"><option>成语</option><option>词语</option></select>
          </label>
          <button id="save-btn" class="btn primary">收录</button>
        </div>
      </div>
      <p class="hint" id="add-hint"></p>
    </section>
    <div class="toolbar">
      <div class="filters" id="filters">
        <button class="chip active" data-f="all">全部</button>
        <button class="chip" data-f="成语">成语</button>
        <button class="chip" data-f="词语">词语</button>
        <button class="chip" data-f="star">收藏</button>
      </div>
      <input id="search" type="search" placeholder="搜索已收录…">
      <button id="export-btn" class="btn">导出 PDF</button>
    </div>
    <section id="list" class="list"></section>
    <p id="empty" class="empty hidden"></p>
    <nav id="pager" class="pager hidden">
      <button id="pg-prev" class="btn">上一页</button>
      <span id="pg-info" class="pg-info"></span>
      <button id="pg-next" class="btn">下一页</button>
    </nav>
  </section>

  <!-- ===== 文件查看器 ===== -->
  <section id="view-viewer" class="view hidden">
    <div class="viewer-bar">
      <span id="viewer-name"></span>
      <a id="viewer-dl" class="btn" download>下载</a>
    </div>
    <iframe id="viewer-frame" title="文件预览"></iframe>
  </section>
</main>

<!-- 上传资料 -->
<div id="upload-modal" class="modal hidden">
  <div class="modal-box">
    <h3>上传资料</h3>
    <div class="opt"><span>板块</span><select id="up-board"></select></div>
    <div class="opt"><span>名称</span><input id="up-title" type="text" placeholder="选填，默认用文件名"></div>
    <input id="up-file" type="file" style="margin:8px 0 14px;width:100%;">
    <div class="modal-actions">
      <button class="btn" id="up-cancel">取消</button>
      <button class="btn primary" id="up-go">上传</button>
    </div>
  </div>
</div>

<!-- 导出 PDF -->
<div id="export-modal" class="modal hidden">
  <div class="modal-box">
    <h3>导出 PDF</h3>
    <div class="opt"><span>范围</span>
      <select id="ex-scope">
        <option value="all">当前筛选的全部</option>
        <option value="成语">仅成语</option>
        <option value="词语">仅词语</option>
        <option value="star">仅收藏</option>
      </select>
    </div>
    <div class="opt"><span>版式</span>
      <select id="ex-mode">
        <option value="study">学习版（含释义）</option>
        <option value="recite">默写版（释义留空）</option>
      </select>
    </div>
    <div class="opt checks" id="ex-fields">
      <label><input type="checkbox" id="ex-der" checked> 出处</label>
      <label><input type="checkbox" id="ex-exa" checked> 例句</label>
      <label><input type="checkbox" id="ex-note" checked> 笔记</label>
    </div>
    <div class="modal-actions">
      <button class="btn" id="ex-cancel">取消</button>
      <button class="btn primary" id="ex-go">下载 PDF</button>
    </div>
  </div>
</div>

<!-- 账号设置 -->
<div id="settings-modal" class="modal hidden">
  <div class="modal-box">
    <h3>账号设置</h3>
    <div class="set-sec">
      <div class="set-title">修改密码</div>
      <input id="set-oldpw" type="password" placeholder="原密码">
      <input id="set-newpw" type="password" placeholder="新密码（至少 6 位，留空不改）">
    </div>
    <div class="set-sec">
      <div class="set-title">密保问题（用于找回密码）</div>
      <select id="set-secq"></select>
      <input id="set-seca" type="text" placeholder="新答案（留空不改）">
    </div>
    <div class="set-sec hidden" id="set-app">
      <div class="set-title">App 设置</div>
      <button class="btn" id="set-server" style="width:100%;">切换服务器地址</button>
    </div>
    <div class="modal-actions">
      <button class="btn" id="set-cancel">取消</button>
      <button class="btn primary" id="set-save">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script src="app.js"></script>
</body>
</html>
