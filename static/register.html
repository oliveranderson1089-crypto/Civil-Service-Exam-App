<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a6fb5">
<title>注册 · 公考助手</title>
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<style>
  body{display:grid;place-items:center;min-height:100vh;
    background:linear-gradient(135deg,#1a6fb5,#2c8fd6);padding:16px 0;}
  .auth-box{background:#fff;border-radius:18px;padding:28px 24px;width:100%;
    max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:16px;}
  .auth-logo{width:54px;height:54px;border-radius:14px;
    background:linear-gradient(135deg,#1a6fb5,#2c8fd6);color:#fff;display:grid;
    place-items:center;font-size:28px;font-weight:700;margin:0 auto 12px;}
  .auth-box h1{font-size:18px;text-align:center;margin:0 0 4px;}
  .auth-box p.sub{text-align:center;color:#8a93a3;font-size:12.5px;margin:0 0 18px;}
  .auth-box label{display:block;font-size:13px;color:#555;margin:10px 0 5px;}
  .auth-box input,.auth-box select{width:100%;padding:10px 12px;border:1.5px solid #e6e9ef;
    border-radius:9px;font-size:15px;outline:none;}
  .auth-box input:focus,.auth-box select:focus{border-color:#1a6fb5;}
  .row2{display:flex;gap:10px;}.row2>div{flex:1;}
  .primary-btn{width:100%;padding:12px;background:#1a6fb5;color:#fff;border:none;
    border-radius:10px;font-size:16px;cursor:pointer;margin-top:18px;}
  .primary-btn:hover{background:#155a93;}
  .primary-btn:disabled{opacity:.6;}
  .err{color:#c0392b;font-size:13px;text-align:center;min-height:18px;margin:8px 0 0;}
  .tolink{display:block;text-align:center;margin-top:12px;font-size:13px;color:#1a6fb5;text-decoration:none;}
</style>
</head>
<body>
<form class="auth-box" id="form">
  <div class="auth-logo">公</div>
  <h1>注册公考助手</h1>
  <p class="sub" id="sub">创建你的账号</p>

  <label>用户名</label>
  <input id="u" type="text" autocomplete="username" placeholder="2 个字符以上">
  <div class="row2">
    <div><label>密码</label><input id="p" type="password" autocomplete="new-password" placeholder="至少 6 位"></div>
    <div><label>确认密码</label><input id="p2" type="password" autocomplete="new-password" placeholder="再输一次"></div>
  </div>
  <label>密保问题（忘记密码时用来重置）</label>
  <select id="secq"></select>
  <label>密保答案</label>
  <input id="seca" type="text" placeholder="请牢记，找回密码时要用">

  <button type="submit" class="primary-btn" id="btn">注 册</button>
  <p class="err" id="err"></p>
  <a class="tolink" href="/login">已有账号？去登录</a>
</form>
<script>
const $ = (id) => document.getElementById(id);
fetch('/api/sec_questions').then(r => r.json()).then(d => {
  $('secq').innerHTML = d.questions.map(q => `<option>${q}</option>`).join('');
});
// 若已有用户，提示第一个注册者为管理员
fetch('/api/me').catch(() => {});
$('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = $('err'); err.textContent = '';
  if ($('p').value !== $('p2').value) { err.textContent = '两次密码不一致'; return; }
  $('btn').disabled = true; $('btn').textContent = '注册中…';
  try {
    const r = await fetch('/api/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: $('u').value.trim(), password: $('p').value,
        sec_question: $('secq').value, sec_answer: $('seca').value.trim(),
      }),
    });
    const d = await r.json();
    if (r.ok) {
      if (d.role === 'admin') alert('你是第一个注册的用户，已设为管理员。');
      location.href = '/';
    } else { err.textContent = d.error || '注册失败'; }
  } catch (_) { err.textContent = '网络错误'; }
  $('btn').disabled = false; $('btn').textContent = '注 册';
});
</script>
</body>
</html>
